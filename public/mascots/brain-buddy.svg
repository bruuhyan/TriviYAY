<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <defs>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd9df"/>
      <stop offset="100%" stop-color="#f4a3b5"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="90" fill="#ffffff"/>

  <!-- glow -->
  <circle cx="110" cy="100" r="28" fill="#ffd84d"/>

  <!-- rays -->
  <g stroke="#ffd84d" stroke-width="8" stroke-linecap="round">
    <line x1="110" y1="48" x2="110" y2="66"/>
    <line x1="110" y1="134" x2="110" y2="152"/>
    <line x1="58" y1="100" x2="76" y2="100"/>
    <line x1="144" y1="100" x2="162" y2="100"/>
    <line x1="75" y1="65" x2="88" y2="78"/>
    <line x1="132" y1="122" x2="145" y2="135"/>
    <line x1="145" y1="65" x2="132" y2="78"/>
    <line x1="88" y1="122" x2="75" y2="135"/>
  </g>

  <!-- brain -->
  <g filter="url(#shadow)">
    <path
      d="
      M145 250
      C105 250 78 220 78 182
      C78 150 98 126 126 116
      C132 78 166 54 204 54
      C233 54 256 66 273 86
      C291 64 320 50 353 50
      C399 50 435 86 435 132
      C435 156 425 176 409 189
      C434 202 450 226 450 256
      C450 300 414 334 370 334
      H160
      C118 334 86 304 86 266
      C86 258 88 252 90 246
      Z"
      fill="url(#brain)"
    />
  </g>

  <!-- folds -->
  <g fill="none" stroke="#eb91a5" stroke-width="10" stroke-linecap="round">
    <path d="M170 130 Q150 165 170 198"/>
    <path d="M235 102 Q215 145 236 182"/>
    <path d="M308 108 Q288 150 308 188"/>
    <path d="M365 148 Q340 168 338 202"/>
  </g>

  <!-- glasses -->
  <g>
    <circle cx="212" cy="218" r="38"
      fill="#ffffff55"
      stroke="#2b2b2b"
      stroke-width="10"/>

    <circle cx="306" cy="218" r="38"
      fill="#ffffff55"
      stroke="#2b2b2b"
      stroke-width="10"/>

    <line x1="250" y1="218" x2="268" y2="218"
      stroke="#2b2b2b"
      stroke-width="8"
      stroke-linecap="round"/>
  </g>

  <!-- eyes -->
  <circle cx="214" cy="222" r="10" fill="#222"/>
  <circle cx="308" cy="222" r="10" fill="#222"/>

  <!-- smile -->
  <path d="M236 275 Q258 294 282 275"
    fill="none"
    stroke="#222"
    stroke-width="10"
    stroke-linecap="round"/>

  <!-- body -->
  <rect x="215" y="332" width="84" height="72" rx="24"
    fill="#46596a"/>

  <!-- arms -->
  <line x1="215" y1="352" x2="182" y2="322"
    stroke="#222"
    stroke-width="10"
    stroke-linecap="round"/>

  <line x1="299" y1="352" x2="342" y2="324"
    stroke="#222"
    stroke-width="10"
    stroke-linecap="round"/>

  <!-- clipboard -->
  <rect x="332" y="292" width="56" height="82" rx="8"
    fill="#5d6d7e"/>

  <g stroke="#eaf2f8" stroke-width="4">
    <line x1="344" y1="312" x2="374" y2="312"/>
    <line x1="344" y1="326" x2="374" y2="326"/>
    <line x1="344" y1="340" x2="366" y2="340"/>
  </g>

  <!-- legs -->
  <line x1="235" y1="404" x2="224" y2="438"
    stroke="#222"
    stroke-width="10"
    stroke-linecap="round"/>

  <line x1="280" y1="404" x2="292" y2="438"
    stroke="#222"
    stroke-width="10"
    stroke-linecap="round"/>

  <!-- shoes -->
  <ellipse cx="218" cy="446" rx="24" ry="14" fill="#7ec8ff"/>
  <ellipse cx="298" cy="446" rx="24" ry="14" fill="#7ec8ff"/>

</svg>